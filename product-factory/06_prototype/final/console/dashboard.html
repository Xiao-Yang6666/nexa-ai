<!DOCTYPE html>
<html lang="zh-CN" data-scheme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪表盘 · Nexa·AI 控制台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="../assets/tokens.css">
<style>
  /* 仪表盘专属：KPI 行 / 图表卡 / 最近调用表 —— 全 token 驱动，零裸色值 */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-5)}
  .kpi{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    padding:var(--space-5);box-shadow:var(--shadow-sm)}
  .kpi-label{font-size:var(--text-body-sm);color:var(--color-text-muted);margin-bottom:var(--space-2);
    display:flex;align-items:center;gap:var(--space-2)}
  .kpi-val{font-family:var(--font-brand);font-size:var(--text-h1);font-weight:var(--fw-bold);
    color:var(--color-text);line-height:var(--lh-tight);letter-spacing:var(--tracking-tight)}
  .kpi-delta{font-size:var(--text-body-sm);margin-top:var(--space-2);display:inline-flex;align-items:center;gap:4px}
  .kpi-delta.up{color:var(--color-success)} .kpi-delta.down{color:var(--color-danger)}
  .chart-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--space-4);margin-bottom:var(--space-5)}
  .chart-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    padding:var(--space-5);box-shadow:var(--shadow-sm)}
  .chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
  .chart-title{font-size:var(--text-h5);font-weight:var(--fw-semibold);color:var(--color-text);margin:0}
  .chart-sub{font-size:var(--text-body-sm);color:var(--color-text-muted)}
  .legend{display:flex;flex-wrap:wrap;gap:var(--space-3);margin-top:var(--space-3);font-size:var(--text-body-sm);
    color:var(--color-text-secondary)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:var(--radius-xs);display:inline-block}
  .ax-txt{font-family:var(--font-mono);font-size:var(--text-overline);fill:var(--color-text-muted)}
  .seg{display:inline-flex;border:1px solid var(--color-border);border-radius:var(--radius-sm);overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--color-text-secondary);font-family:inherit;
    font-size:var(--text-body-sm);padding:var(--space-1) var(--space-3);cursor:pointer}
  .seg button.on{background:color-mix(in oklch,var(--color-primary-500) 14%,transparent);color:var(--color-primary-700)}
  .table-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-sm);overflow:hidden}
  .table-card .th-bar{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-5);
    border-bottom:1px solid var(--color-border)}
  .table-wrap{overflow-x:auto}
  .table-wrap td,.table-wrap th{padding:var(--space-3) var(--space-5)}
  .donut-center{font-family:var(--font-brand);fill:var(--color-text);font-weight:var(--fw-bold)}
  .donut-center-sub{fill:var(--color-text-muted)}
  @media (max-width:1024px){.kpi-row{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}}
  @media (max-width:560px){.kpi-row{grid-template-columns:1fr}}
</style>
</head>
<body data-page="dashboard" data-title="仪表盘" data-crumb="控制台|仪表盘">

  <!-- KPI 顶行 -->
  <section class="kpi-row">
    <div class="kpi nx-fade">
      <div class="kpi-label">本月调用量</div>
      <div class="kpi-val" data-count="1284502">0</div>
      <div class="kpi-delta up">较上月 +12.4%</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">本月消费</div>
      <div class="kpi-val" data-count="2841.76" data-dec="2" data-prefix="$">0</div>
      <div class="kpi-delta up">较上月 +8.1%</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">平均延迟</div>
      <div class="kpi-val" data-count="412" data-suffix=" ms">0</div>
      <div class="kpi-delta down">较上月 -23 ms</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">成功率</div>
      <div class="kpi-val" data-count="99.7" data-dec="1" data-suffix="%">0</div>
      <div class="kpi-delta up">较上月 +0.2%</div>
    </div>
  </section>

  <!-- 图表区 -->
  <section class="chart-grid">
    <!-- 近30天调用量趋势：面积折线图 -->
    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">近 30 天调用量趋势</h3>
          <div class="chart-sub">单位：千次调用 · 按日聚合</div>
        </div>
        <div class="seg" role="tablist">
          <button class="on" type="button">调用量</button>
          <button type="button">消费</button>
        </div>
      </div>
      <svg id="trend" viewBox="0 0 720 280" width="100%" role="img" aria-label="近30天调用量趋势折线图"></svg>
    </div>

    <!-- 模型调用分布：环形图 -->
    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">模型调用分布</h3>
          <div class="chart-sub">本月按模型占比</div>
        </div>
      </div>
      <svg id="donut" viewBox="0 0 240 240" width="100%" height="200" role="img" aria-label="模型调用分布环形图"></svg>
      <div class="legend" id="donut-legend"></div>
    </div>
  </section>

  <!-- 延迟分布：柱状图 -->
  <section class="chart-grid" style="grid-template-columns:1fr">
    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">P50 / P95 延迟分布（按模型）</h3>
          <div class="chart-sub">单位：毫秒 · 近 7 天</div>
        </div>
        <div class="legend">
          <span><i style="background:var(--chart-1)"></i>P50</span>
          <span><i style="background:var(--chart-4)"></i>P95</span>
        </div>
      </div>
      <svg id="bars" viewBox="0 0 720 240" width="100%" role="img" aria-label="模型延迟分布柱状图"></svg>
    </div>
  </section>

  <!-- 最近调用记录 -->
  <section class="table-card nx-fade">
    <div class="th-bar">
      <h3 class="chart-title">最近调用记录</h3>
      <a class="btn-link" href="usage.html">查看全部用量</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>时间</th><th>模型</th><th>Tokens</th><th>费用</th><th>延迟</th><th>状态</th></tr></thead>
        <tbody id="recent"></tbody>
      </table>
    </div>
  </section>

  <script src="console-shell.js"></script>
  <script>
  (function(){
    NexaShell.mount();
    NexaShell.countAll('[data-count]');

    // ── 工具：读取 CSS 变量真实值（用于 SVG fill/stroke，避免裸色值） ──
    function cssvar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

    // ════ 图表 1：近30天调用量趋势（面积折线） ════
    (function(){
      var data=[42,48,45,52,60,58,64,71,68,74,82,79,88,95,91,98,104,110,107,118,124,121,130,138,135,142,150,147,156,163];
      var W=720,H=280,pad={l:48,r:18,t:18,b:32};
      var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
      var max=Math.max.apply(null,data)*1.1, min=0;
      var xs=function(i){return pad.l+i*(iw/(data.length-1));};
      var ys=function(v){return pad.t+ih-(v-min)/(max-min)*ih;};
      var svg=document.getElementById('trend');
      var c1=cssvar('--chart-1'), grid=cssvar('--chart-grid'), axis=cssvar('--chart-axis');
      var g='';
      // 网格 + Y 轴刻度
      for(var t=0;t<=4;t++){
        var v=min+(max-min)*t/4, y=ys(v);
        g+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="'+grid+'" stroke-width="1"/>';
        g+='<text class="ax-txt" x="'+(pad.l-8)+'" y="'+(y+3)+'" text-anchor="end">'+Math.round(v)+'k</text>';
      }
      // X 轴刻度（每 5 天）
      for(var d=0;d<data.length;d+=5){
        g+='<text class="ax-txt" x="'+xs(d)+'" y="'+(H-10)+'" text-anchor="middle">'+(d+1)+'日</text>';
      }
      // 面积 + 折线
      var line='', area='M'+pad.l+' '+ys(0);
      data.forEach(function(v,i){ var pt=xs(i)+' '+ys(v); line+=(i?'L':'M')+pt+' '; area+=' L'+pt; });
      area+=' L'+xs(data.length-1)+' '+ys(0)+' Z';
      g+='<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">'+
         '<stop offset="0%" stop-color="'+c1+'" stop-opacity="0.32"/>'+
         '<stop offset="100%" stop-color="'+c1+'" stop-opacity="0"/></linearGradient></defs>';
      g+='<path d="'+area+'" fill="url(#tg)"/>';
      g+='<polyline points="'+data.map(function(v,i){return xs(i)+','+ys(v);}).join(' ')+'" fill="none" stroke="'+c1+'" stroke-width="2.4" stroke-linejoin="round"/>';
      // 末点高亮
      g+='<circle cx="'+xs(data.length-1)+'" cy="'+ys(data[data.length-1])+'" r="4" fill="'+c1+'"/>';
      svg.innerHTML=g;
    })();

    // ════ 图表 2：模型调用分布（环形 donut） ════
    (function(){
      var slices=[
        {name:'GPT-4o',     val:38, col:'--chart-1'},
        {name:'Claude 3.5', val:24, col:'--chart-2'},
        {name:'Gemini 1.5', val:16, col:'--chart-4'},
        {name:'GPT-4o-mini',val:12, col:'--chart-5'},
        {name:'其他',       val:10, col:'--chart-6'}
      ];
      var cx=120,cy=110,r=78,rin=50, total=100, ang=-Math.PI/2;
      var svg=document.getElementById('donut'), g='';
      function pt(a,rad){return [cx+Math.cos(a)*rad, cy+Math.sin(a)*rad];}
      slices.forEach(function(s){
        var a0=ang, a1=ang+s.val/total*Math.PI*2; ang=a1;
        var large=(a1-a0)>Math.PI?1:0;
        var p0=pt(a0,r),p1=pt(a1,r),q0=pt(a1,rin),q1=pt(a0,rin);
        var col=cssvar(s.col);
        g+='<path d="M'+p0[0]+' '+p0[1]+' A'+r+' '+r+' 0 '+large+' 1 '+p1[0]+' '+p1[1]+
           ' L'+q0[0]+' '+q0[1]+' A'+rin+' '+rin+' 0 '+large+' 0 '+q1[0]+' '+q1[1]+' Z" fill="'+col+'"/>';
      });
      g+='<text class="donut-center" x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-size="26">1.28M</text>';
      g+='<text class="donut-center-sub" x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" font-size="11">本月调用</text>';
      svg.innerHTML=g;
      document.getElementById('donut-legend').innerHTML=slices.map(function(s){
        return '<span><i style="background:var('+s.col+')"></i>'+s.name+' '+s.val+'%</span>';
      }).join('');
    })();

    // ════ 图表 3：延迟分布柱状图（P50/P95 分组） ════
    (function(){
      var rows=[
        {m:'GPT-4o',p50:380,p95:920},
        {m:'Claude 3.5',p50:420,p95:1040},
        {m:'Gemini 1.5',p50:310,p95:760},
        {m:'GPT-4o-mini',p50:180,p95:430},
        {m:'Llama 3.1',p50:240,p95:580}
      ];
      var W=720,H=240,pad={l:48,r:18,t:14,b:34};
      var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
      var max=1100;
      var svg=document.getElementById('bars'), g='';
      var c1=cssvar('--chart-1'), c4=cssvar('--chart-4'), grid=cssvar('--chart-grid');
      for(var t=0;t<=4;t++){
        var v=max*t/4, y=pad.t+ih-v/max*ih;
        g+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="'+grid+'" stroke-width="1"/>';
        g+='<text class="ax-txt" x="'+(pad.l-8)+'" y="'+(y+3)+'" text-anchor="end">'+v+'</text>';
      }
      var gw=iw/rows.length, bw=18;
      rows.forEach(function(r,i){
        var cx=pad.l+gw*i+gw/2;
        var h50=r.p50/max*ih, h95=r.p95/max*ih;
        g+='<rect x="'+(cx-bw-3)+'" y="'+(pad.t+ih-h50)+'" width="'+bw+'" height="'+h50+'" rx="3" fill="'+c1+'"/>';
        g+='<rect x="'+(cx+3)+'" y="'+(pad.t+ih-h95)+'" width="'+bw+'" height="'+h95+'" rx="3" fill="'+c4+'"/>';
        g+='<text class="ax-txt" x="'+cx+'" y="'+(H-10)+'" text-anchor="middle">'+r.m+'</text>';
      });
      svg.innerHTML=g;
    })();

    // ════ 最近调用记录表 ════
    (function(){
      var rows=[
        ['10:42:18','GPT-4o','3,182','$0.0412','392 ms','suc'],
        ['10:41:55','Claude 3.5 Sonnet','5,640','$0.0689','451 ms','suc'],
        ['10:41:30','GPT-4o-mini','1,204','$0.0031','176 ms','suc'],
        ['10:40:12','Gemini 1.5 Pro','2,890','$0.0241','318 ms','suc'],
        ['10:39:44','GPT-4o','4,021','$0.0518','None','err'],
        ['10:38:09','Claude 3.5 Sonnet','6,210','$0.0762','489 ms','suc'],
        ['10:37:51','Llama 3.1 70B','1,980','$0.0099','244 ms','suc'],
        ['10:36:33','GPT-4o','2,150','$0.0276','407 ms','warn']
      ];
      var bmap={suc:'b-suc',err:'b-dan',warn:'b-warn'}, lmap={suc:'成功',err:'失败',warn:'限流重试'};
      var dmap={suc:'--color-success',err:'--color-danger',warn:'--color-warning'};
      document.getElementById('recent').innerHTML=rows.map(function(r){
        return '<tr><td class="mono-num">'+r[0]+'</td><td>'+r[1]+'</td>'+
          '<td class="mono-num">'+r[2]+'</td><td class="mono-num">'+r[3]+'</td>'+
          '<td class="mono-num">'+r[4]+'</td>'+
          '<td><span class="badge '+bmap[r[5]]+'"><span class="dot" style="background:var('+dmap[r[5]]+')"></span>'+lmap[r[5]]+'</span></td></tr>';
      }).join('');
    })();
  })();
  </script>
</body>
</html>
