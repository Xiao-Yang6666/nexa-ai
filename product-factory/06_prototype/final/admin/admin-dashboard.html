<!DOCTYPE html>
<html lang="zh-CN" data-scheme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局概览 · Nexa·AI 管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="../assets/tokens.css">
<script src="admin-shell.js"></script>
<style>
  /* 全局概览专属：KPI 行 / 图表卡 / 告警表 —— 全 token 驱动，零裸色值 */
  .kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--space-4);margin-bottom:var(--space-5)}
  .kpi{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    padding:var(--space-4) var(--space-5);box-shadow:var(--shadow-sm)}
  .kpi-label{font-size:var(--text-body-sm);color:var(--color-text-muted);margin-bottom:var(--space-2);
    display:flex;align-items:center;gap:var(--space-2)}
  .kpi-val{font-family:var(--font-brand);font-size:var(--text-h3);font-weight:var(--fw-bold);
    color:var(--color-text);line-height:var(--lh-tight);letter-spacing:var(--tracking-tight)}
  .kpi-delta{font-size:var(--text-caption);margin-top:var(--space-2);display:inline-flex;align-items:center;gap:4px}
  .kpi-delta.up{color:var(--color-success)} .kpi-delta.down{color:var(--color-danger)}
  .kpi-delta.flat{color:var(--color-text-muted)}
  .chart-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--space-4);margin-bottom:var(--space-5)}
  .chart-grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:var(--space-4);margin-bottom:var(--space-5)}
  .chart-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    padding:var(--space-5);box-shadow:var(--shadow-sm)}
  .chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
  .chart-title{font-size:var(--text-h5);font-weight:var(--fw-semibold);color:var(--color-text);margin:0}
  .chart-sub{font-size:var(--text-body-sm);color:var(--color-text-muted)}
  .legend{display:flex;flex-wrap:wrap;gap:var(--space-3);margin-top:var(--space-3);font-size:var(--text-body-sm);
    color:var(--color-text-secondary)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:var(--radius-xs);display:inline-block}
  .ax-txt{font-family:var(--font-mono);font-size:var(--text-overline);fill:var(--color-text-muted)}
  .donut-center{font-family:var(--font-brand);fill:var(--color-text);font-weight:var(--fw-bold)}
  .donut-center-sub{fill:var(--color-text-muted)}
  /* 渠道健康度状态计数 */
  .health-row{display:flex;flex-direction:column;gap:var(--space-3)}
  .health-item{display:flex;align-items:center;gap:var(--space-3)}
  .health-bar{flex:1;height:8px;border-radius:var(--radius-full);background:var(--color-surface-sunken);overflow:hidden}
  .health-bar i{display:block;height:100%;border-radius:var(--radius-full)}
  .health-cnt{font-family:var(--font-mono);font-size:var(--text-body-sm);color:var(--color-text);min-width:34px;text-align:right}
  .health-lab{font-size:var(--text-body-sm);color:var(--color-text-secondary);min-width:78px;display:flex;align-items:center;gap:6px}
  /* 告警表 */
  .table-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-sm);overflow:hidden}
  .table-card .th-bar{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-5);
    border-bottom:1px solid var(--color-border)}
  .table-wrap{overflow-x:auto}
  .table-wrap td,.table-wrap th{padding:var(--space-3) var(--space-5)}
  .err-rate{font-family:var(--font-mono);color:var(--color-danger)}
  @media (max-width:1280px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:1024px){.chart-grid,.chart-grid2{grid-template-columns:1fr}}
  @media (max-width:560px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body data-page="admin-dashboard" data-title="全局概览" data-crumb="管理后台|全局概览">

  <!-- KPI 顶行 6 卡 -->
  <section class="kpi-row">
    <div class="kpi nx-fade">
      <div class="kpi-label">今日请求量</div>
      <div class="kpi-val" data-count="3842157">0</div>
      <div class="kpi-delta up">较昨日 +6.8%</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">今日费用</div>
      <div class="kpi-val" data-count="8421.39" data-dec="2" data-prefix="$">0</div>
      <div class="kpi-delta up">较昨日 +4.2%</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">活跃渠道数</div>
      <div class="kpi-val" data-count="38" data-suffix=" / 42">0</div>
      <div class="kpi-delta down">4 个自动禁用</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">总用户数</div>
      <div class="kpi-val" data-count="12480">0</div>
      <div class="kpi-delta up">较昨日 +37</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">今日任务量</div>
      <div class="kpi-val" data-count="9264">0</div>
      <div class="kpi-delta up">较昨日 +11.5%</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">全局成功率</div>
      <div class="kpi-val" data-count="99.2" data-dec="1" data-suffix="%">0</div>
      <div class="kpi-delta flat">较昨日 -0.1%</div>
    </div>
  </section>

  <!-- 图表区 1：趋势折线 + 模型环形 -->
  <section class="chart-grid">
    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">近 30 天全站请求量趋势</h3>
          <div class="chart-sub">单位：万次请求 · 按日聚合</div>
        </div>
      </div>
      <svg id="trend" viewBox="0 0 760 280" width="100%" role="img" aria-label="近30天全站请求量趋势折线图"></svg>
    </div>

    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">模型调用分布</h3>
          <div class="chart-sub">今日按模型占比</div>
        </div>
      </div>
      <svg id="donut" viewBox="0 0 240 240" width="100%" height="200" role="img" aria-label="模型调用分布环形图"></svg>
      <div class="legend" id="donut-legend"></div>
    </div>
  </section>

  <!-- 图表区 2：Top 渠道横向柱状 + 渠道健康度 -->
  <section class="chart-grid2">
    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">Top 渠道请求量排名</h3>
          <div class="chart-sub">今日 · 单位万次</div>
        </div>
      </div>
      <svg id="ranks" viewBox="0 0 720 300" width="100%" role="img" aria-label="Top渠道请求量横向柱状图"></svg>
    </div>

    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">渠道健康度</h3>
          <div class="chart-sub">按状态计数 · 共 42 个渠道</div>
        </div>
      </div>
      <div class="health-row" id="health"></div>
    </div>
  </section>

  <!-- 异常渠道告警列表 -->
  <section class="table-card nx-fade">
    <div class="th-bar">
      <h3 class="chart-title">异常渠道告警</h3>
      <a class="btn-link" href="channels.html">进入渠道管理</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>渠道名</th><th>类型</th><th>错误率</th><th>状态</th><th>最后错误时间</th><th>操作</th></tr></thead>
        <tbody id="alerts"></tbody>
      </table>
    </div>
  </section>

  <script src="admin-shell.js"></script>
  <script>
  (function(){
    NexaShell.mount();
    NexaShell.countAll('[data-count]');
    var cssvar = NexaShell.cssvar;

    // ════ 图表 1：近30天全站请求量趋势（面积折线，--chart-1） ════
    (function(){
      var data=[286,302,295,318,330,322,345,360,352,374,392,385,408,420,412,438,452,470,463,488,502,495,520,536,528,552,571,564,588,612];
      var W=760,H=280,pad={l:52,r:18,t:18,b:32};
      var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
      var max=Math.max.apply(null,data)*1.1, min=0;
      var xs=function(i){return pad.l+i*(iw/(data.length-1));};
      var ys=function(v){return pad.t+ih-(v-min)/(max-min)*ih;};
      var svg=document.getElementById('trend');
      var c1=cssvar('--chart-1'), grid=cssvar('--chart-grid');
      var g='';
      for(var t=0;t<=4;t++){
        var v=min+(max-min)*t/4, y=ys(v);
        g+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="'+grid+'" stroke-width="1"/>';
        g+='<text class="ax-txt" x="'+(pad.l-8)+'" y="'+(y+3)+'" text-anchor="end">'+Math.round(v)+'</text>';
      }
      for(var d=0;d<data.length;d+=5){
        g+='<text class="ax-txt" x="'+xs(d)+'" y="'+(H-10)+'" text-anchor="middle">'+(d+1)+'日</text>';
      }
      var area='M'+pad.l+' '+ys(0);
      data.forEach(function(v,i){ area+=' L'+xs(i)+' '+ys(v); });
      area+=' L'+xs(data.length-1)+' '+ys(0)+' Z';
      g+='<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">'+
         '<stop offset="0%" stop-color="'+c1+'" stop-opacity="0.30"/>'+
         '<stop offset="100%" stop-color="'+c1+'" stop-opacity="0"/></linearGradient></defs>';
      g+='<path d="'+area+'" fill="url(#tg)"/>';
      g+='<polyline points="'+data.map(function(v,i){return xs(i)+','+ys(v);}).join(' ')+'" fill="none" stroke="'+c1+'" stroke-width="2.4" stroke-linejoin="round"/>';
      g+='<circle cx="'+xs(data.length-1)+'" cy="'+ys(data[data.length-1])+'" r="4" fill="'+c1+'"/>';
      svg.innerHTML=g;
    })();

    // ════ 图表 2：模型调用分布（环形 donut） ════
    (function(){
      var slices=[
        {name:'GPT-4o',      val:34, col:'--chart-1'},
        {name:'Claude 3.5',  val:26, col:'--chart-2'},
        {name:'Gemini 1.5',  val:15, col:'--chart-4'},
        {name:'GPT-4o-mini', val:13, col:'--chart-5'},
        {name:'其他',        val:12, col:'--chart-6'}
      ];
      var cx=120,cy=110,r=78,rin=50, total=100, ang=-Math.PI/2;
      var svg=document.getElementById('donut'), g='';
      function pt(a,rad){return [cx+Math.cos(a)*rad, cy+Math.sin(a)*rad];}
      slices.forEach(function(s){
        var a0=ang, a1=ang+s.val/total*Math.PI*2; ang=a1;
        var large=(a1-a0)>Math.PI?1:0;
        var p0=pt(a0,r),p1=pt(a1,r),q0=pt(a1,rin),q1=pt(a0,rin);
        var col=cssvar(s.col);
        g+='<path d="M'+p0[0]+' '+p0[1]+' A'+r+' '+r+' 0 '+large+' 1 '+p1[0]+' '+p1[1]+
           ' L'+q0[0]+' '+q0[1]+' A'+rin+' '+rin+' 0 '+large+' 0 '+q1[0]+' '+q1[1]+' Z" fill="'+col+'"/>';
      });
      g+='<text class="donut-center" x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-size="24">3.84M</text>';
      g+='<text class="donut-center-sub" x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" font-size="11">今日请求</text>';
      svg.innerHTML=g;
      document.getElementById('donut-legend').innerHTML=slices.map(function(s){
        return '<span><i style="background:var('+s.col+')"></i>'+s.name+' '+s.val+'%</span>';
      }).join('');
    })();

    // ════ 图表 3：Top 渠道请求量排名（横向柱状，多色） ════
    (function(){
      var rows=[
        {name:'OpenAI 主通道',   val:1248, col:'--chart-1'},
        {name:'Azure OpenAI',    val:986,  col:'--chart-2'},
        {name:'Anthropic 官方',  val:742,  col:'--chart-4'},
        {name:'Google Vertex',   val:531,  col:'--chart-5'},
        {name:'第三方聚合 A',    val:418,  col:'--chart-6'},
        {name:'第三方聚合 B',    val:307,  col:'--chart-7'}
      ];
      var W=720,H=300,pad={l:118,r:54,t:10,b:24};
      var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
      var max=1300;
      var svg=document.getElementById('ranks'), g='';
      var grid=cssvar('--chart-grid');
      for(var t=0;t<=4;t++){
        var v=max*t/4, x=pad.l+v/max*iw;
        g+='<line x1="'+x+'" y1="'+pad.t+'" x2="'+x+'" y2="'+(pad.t+ih)+'" stroke="'+grid+'" stroke-width="1"/>';
        g+='<text class="ax-txt" x="'+x+'" y="'+(H-8)+'" text-anchor="middle">'+v+'</text>';
      }
      var gh=ih/rows.length, bh=18;
      rows.forEach(function(r,i){
        var cy=pad.t+gh*i+gh/2;
        var w=r.val/max*iw, col=cssvar(r.col);
        g+='<text class="ax-txt" x="'+(pad.l-10)+'" y="'+(cy+4)+'" text-anchor="end" style="fill:var(--color-text-secondary)">'+r.name+'</text>';
        g+='<rect x="'+pad.l+'" y="'+(cy-bh/2)+'" width="'+w+'" height="'+bh+'" rx="4" fill="'+col+'"/>';
        g+='<text class="ax-txt" x="'+(pad.l+w+8)+'" y="'+(cy+4)+'" text-anchor="start" style="fill:var(--color-text)">'+r.val+'</text>';
      });
      svg.innerHTML=g;
    })();

    // ════ 渠道健康度状态计数（条形比例） ════
    (function(){
      var items=[
        {lab:'启用正常',  cnt:36, tone:'--color-success'},
        {lab:'手动禁用',  cnt:2,  tone:'--color-text-muted'},
        {lab:'自动禁用',  cnt:3,  tone:'--color-danger'},
        {lab:'限流告警',  cnt:1,  tone:'--color-warning'}
      ];
      var total=items.reduce(function(s,i){return s+i.cnt;},0);
      document.getElementById('health').innerHTML=items.map(function(it){
        var pct=Math.round(it.cnt/total*100);
        return '<div class="health-item">'+
          '<span class="health-lab"><span class="dot" style="background:var('+it.tone+')"></span>'+it.lab+'</span>'+
          '<span class="health-bar"><i style="width:'+pct+'%;background:var('+it.tone+')"></i></span>'+
          '<span class="health-cnt">'+it.cnt+'</span></div>';
      }).join('');
    })();

    // ════ 异常渠道告警列表 ════
    (function(){
      var rows=[
        ['第三方聚合 C','OpenAI 兼容','12.4%','auto','06-20 04:58'],
        ['Cohere 备用','Cohere','8.7%','auto','06-20 04:41'],
        ['第三方聚合 D','OpenAI 兼容','6.2%','warn','06-20 04:33'],
        ['Mistral 直连','Mistral','5.1%','warn','06-20 04:12'],
        ['Azure 备区','Azure OpenAI','21.8%','auto','06-20 03:55']
      ];
      var bmap={auto:'b-dan',warn:'b-warn'}, lmap={auto:'自动禁用',warn:'限流告警'};
      var dmap={auto:'--color-danger',warn:'--color-warning'};
      document.getElementById('alerts').innerHTML=rows.map(function(r){
        return '<tr><td>'+r[0]+'</td><td class="muted">'+r[1]+'</td>'+
          '<td class="err-rate">'+r[2]+'</td>'+
          '<td><span class="badge '+bmap[r[3]]+'"><span class="dot" style="background:var('+dmap[r[3]]+')"></span>'+lmap[r[3]]+'</span></td>'+
          '<td class="mono-num muted">'+r[4]+'</td>'+
          '<td><a class="btn-link" href="channels.html">处理</a></td></tr>';
      }).join('');
    })();
  })();
  </script>
</body>
</html>
