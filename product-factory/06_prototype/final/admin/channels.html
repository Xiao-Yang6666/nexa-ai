<!DOCTYPE html>
<html lang="zh-CN" data-scheme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渠道管理 · Nexa·AI 管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="../assets/tokens.css">
<script src="admin-shell.js"></script>
<style>
  /* 渠道管理专属 —— 全 token 驱动，零裸色值 */
  .filterbar{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)}
  .filterbar .sel,.filterbar .srch{height:36px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
    background:var(--color-bg-elevated);color:var(--color-text);font-family:inherit;font-size:var(--text-body-sm);padding:0 var(--space-3)}
  .filterbar .srch{min-width:220px}
  .filterbar .sel:focus,.filterbar .srch:focus{outline:none;border-color:var(--color-primary-500);box-shadow:var(--focus-ring)}
  .filterbar .grow{margin-left:auto}
  .batchbar{display:none;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3);
    padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);
    background:color-mix(in oklch,var(--color-primary-500) 10%,transparent);
    border:1px solid color-mix(in oklch,var(--color-primary-500) 30%,transparent)}
  .batchbar.on{display:flex}
  .batchbar .cnt{font-size:var(--text-body-sm);color:var(--color-primary-700);font-weight:var(--fw-medium)}
  .batchbar .grow{margin-left:auto}
  .table-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-sm);overflow:hidden}
  .table-wrap{overflow-x:auto}
  .table-wrap table{min-width:1120px}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable .arr{color:var(--color-text-muted);font-family:var(--font-mono);margin-left:4px}
  .cellmono{font-family:var(--font-mono)}
  .row-acts{display:flex;gap:var(--space-3);white-space:nowrap}
  .row-acts a{font-size:var(--text-body-sm);color:var(--color-primary-500);cursor:pointer}
  .row-acts a:hover{color:var(--color-primary-600)}
  .row-acts a.dang{color:var(--color-danger)}
  .bar-mini{display:inline-block;width:70px;height:6px;border-radius:var(--radius-full);background:var(--color-surface-sunken);
    overflow:hidden;vertical-align:middle;margin-right:6px}
  .bar-mini i{display:block;height:100%;background:var(--color-primary-500);border-radius:var(--radius-full)}
  .pager{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-5);
    border-top:1px solid var(--color-border);font-size:var(--text-body-sm);color:var(--color-text-muted)}
  .pager .pg{display:flex;gap:var(--space-1)}
  .pager .pg button{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
    background:var(--color-bg-elevated);color:var(--color-text-secondary);font-family:inherit;cursor:pointer}
  .pager .pg button.on{background:var(--color-primary-500);color:var(--color-primary-fg);border-color:var(--color-primary-500)}
  /* 抽屉 */
  .drawer-scrim{display:none;position:fixed;inset:0;z-index:60;background:color-mix(in oklch,var(--color-surface-sunken) 72%,transparent)}
  .drawer-scrim.on{display:block}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:92vw;z-index:61;transform:translateX(100%);
    background:var(--color-bg-elevated);border-left:1px solid var(--color-border);box-shadow:var(--shadow-lg);
    display:flex;flex-direction:column;transition:transform var(--dur-2) var(--ease-out)}
  .drawer.on{transform:none}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:var(--space-5);
    border-bottom:1px solid var(--color-border)}
  .drawer-title{font-family:var(--font-brand);font-size:var(--text-h4);font-weight:var(--fw-bold);color:var(--color-text);margin:0}
  .drawer-x{background:transparent;border:none;color:var(--color-text-muted);cursor:pointer;width:32px;height:32px;
    border-radius:var(--radius-sm);font-size:var(--text-h5)}
  .drawer-x:hover{background:var(--color-surface-sunken);color:var(--color-text)}
  .drawer-body{flex:1;overflow-y:auto;padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4)}
  .drawer-foot{display:flex;justify-content:flex-end;gap:var(--space-3);padding:var(--space-4) var(--space-5);
    border-top:1px solid var(--color-border)}
  .tagin{display:flex;flex-wrap:wrap;gap:6px;padding:var(--space-2);border:1px solid var(--color-border);
    border-radius:var(--radius-sm);background:var(--color-bg-elevated);min-height:40px}
  .tagin .tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:var(--text-caption);
    background:var(--color-bg-subtle);color:var(--color-text-secondary);padding:2px 8px;border-radius:var(--radius-sm)}
  .tagin .tag b{cursor:pointer;color:var(--color-text-muted)}
  .tagin input{flex:1;min-width:80px;border:none;background:transparent;color:var(--color-text);font-family:var(--font-mono);
    font-size:var(--text-body-sm);outline:none}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
  .sw-row{display:flex;align-items:center;justify-content:space-between}
  @media (max-width:560px){.filterbar .srch{min-width:140px}}
</style>
</head>
<body data-page="channels" data-title="渠道管理" data-crumb="管理后台|资源管理|渠道管理"
      data-actions='<button class="btn btn-primary" id="newCh">新建渠道</button>'>

  <!-- FilterBar -->
  <section class="filterbar nx-fade">
    <select class="sel" id="fType">
      <option value="">全部类型</option>
      <option>OpenAI 官方</option>
      <option>Azure OpenAI</option>
      <option>Anthropic</option>
      <option>Google Vertex</option>
      <option>OpenAI 兼容</option>
      <option>Mistral</option>
      <option>Cohere</option>
    </select>
    <select class="sel" id="fStatus">
      <option value="">全部状态</option>
      <option>启用</option>
      <option>手动禁用</option>
      <option>自动禁用</option>
    </select>
    <input class="srch" id="fSearch" type="search" placeholder="搜索渠道名 / Base URL / ID">
    <span class="grow"></span>
    <button class="btn btn-sec btn-sm" id="testAll">测试连通性</button>
  </section>

  <!-- BatchBar -->
  <section class="batchbar" id="batchbar">
    <span class="cnt" id="batchCnt">已选 0 项</span>
    <span class="grow"></span>
    <button class="btn btn-sec btn-sm">批量启用</button>
    <button class="btn btn-sec btn-sm">批量禁用</button>
    <button class="btn btn-danger btn-sm">批量删除</button>
  </section>

  <!-- 密集表格 -->
  <section class="table-card nx-fade">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:34px"><input type="checkbox" id="chkAll" aria-label="全选"></th>
            <th class="sortable">ID <span class="arr"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th class="sortable">渠道名 <span class="arr"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th>类型</th>
            <th>状态</th>
            <th class="sortable">优先级 <span class="arr"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th class="sortable">权重 <span class="arr"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th>已用 / 余额</th>
            <th class="sortable">响应延迟 <span class="arr"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th>最后测试</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span id="pgInfo">共 16 个渠道</span>
      <div class="pg">
        <button>‹</button>
        <button class="on">1</button>
        <button>2</button>
        <button>›</button>
      </div>
    </div>
  </section>

  <!-- 编辑抽屉 -->
  <div class="drawer-scrim" id="drawerScrim"></div>
  <aside class="drawer" id="drawer" aria-label="渠道编辑">
    <div class="drawer-head">
      <h2 class="drawer-title">新建渠道</h2>
      <button class="drawer-x" id="drawerX" aria-label="关闭">×</button>
    </div>
    <div class="drawer-body">
      <div>
        <label class="field-label">渠道名 <span class="field-req">*</span></label>
        <input class="input" placeholder="例如：OpenAI 主通道">
      </div>
      <div>
        <label class="field-label">渠道类型 <span class="field-req">*</span></label>
        <select class="input">
          <option>OpenAI 官方</option>
          <option>Azure OpenAI</option>
          <option>Anthropic</option>
          <option>Google Vertex</option>
          <option>OpenAI 兼容</option>
          <option>Mistral</option>
          <option>Cohere</option>
        </select>
      </div>
      <div>
        <label class="field-label">Base URL</label>
        <input class="input cellmono" placeholder="https://api.openai.com/v1">
      </div>
      <div>
        <label class="field-label">API Keys（可多个）</label>
        <div class="tagin" id="keyTags">
          <span class="tag">sk-****a91f <b>×</b></span>
          <span class="tag">sk-****7d2c <b>×</b></span>
          <input type="text" placeholder="粘贴 Key 后回车">
        </div>
        <div class="field-hint">支持多 Key 轮询，自动剔除失效 Key</div>
      </div>
      <div>
        <label class="field-label">模型映射</label>
        <textarea class="input" style="height:78px;padding:var(--space-2) var(--space-3)" placeholder="gpt-4o=gpt-4o-2024-08-06&#10;claude-3.5=claude-3-5-sonnet-latest"></textarea>
      </div>
      <div class="row2">
        <div>
          <label class="field-label">优先级</label>
          <input class="input cellmono" value="10">
        </div>
        <div>
          <label class="field-label">权重</label>
          <input class="input cellmono" value="5">
        </div>
      </div>
      <div class="sw-row">
        <label class="field-label" style="margin:0">启用渠道</label>
        <label class="switch"><input type="checkbox" checked><span class="track"></span><span class="thumb"></span></label>
      </div>
    </div>
    <div class="drawer-foot">
      <button class="btn btn-ghost" id="drawerCancel">取消</button>
      <button class="btn btn-primary">保存渠道</button>
    </div>
  </aside>

  <script src="admin-shell.js"></script>
  <script>
  (function(){
    NexaShell.mount();

    // ════ 渠道数据（14+ 行，状态多样） ════
    var data=[
      {id:101,name:'OpenAI 主通道',  type:'OpenAI 官方',    st:'on',  pr:10, wt:8, used:'$4,120',  bal:'$880',   lat:392},
      {id:102,name:'Azure OpenAI',   type:'Azure OpenAI',   st:'on',  pr:9,  wt:7, used:'$3,560',  bal:'$1,440', lat:418},
      {id:103,name:'Anthropic 官方', type:'Anthropic',      st:'on',  pr:9,  wt:6, used:'$2,980',  bal:'$2,020', lat:451},
      {id:104,name:'Google Vertex',  type:'Google Vertex',  st:'on',  pr:8,  wt:5, used:'$1,740',  bal:'$1,260', lat:368},
      {id:105,name:'第三方聚合 A',   type:'OpenAI 兼容',    st:'on',  pr:6,  wt:4, used:'$1,210',  bal:'$790',   lat:512},
      {id:106,name:'第三方聚合 B',   type:'OpenAI 兼容',    st:'on',  pr:6,  wt:3, used:'$960',    bal:'$540',   lat:548},
      {id:107,name:'Mistral 直连',   type:'Mistral',        st:'warn',pr:5,  wt:3, used:'$420',    bal:'$580',   lat:634},
      {id:108,name:'Cohere 备用',    type:'Cohere',         st:'auto',pr:4,  wt:2, used:'$210',    bal:'$290',   lat:0},
      {id:109,name:'第三方聚合 C',   type:'OpenAI 兼容',    st:'auto',pr:4,  wt:2, used:'$180',    bal:'$120',   lat:0},
      {id:110,name:'Azure 备区',     type:'Azure OpenAI',   st:'auto',pr:7,  wt:4, used:'$1,020',  bal:'$480',   lat:0},
      {id:111,name:'OpenAI 备通道',  type:'OpenAI 官方',    st:'on',  pr:8,  wt:5, used:'$2,310',  bal:'$1,690', lat:401},
      {id:112,name:'内测沙箱',       type:'OpenAI 兼容',    st:'man', pr:2,  wt:1, used:'$0',      bal:'$1,000', lat:0},
      {id:113,name:'DeepSeek 直连',  type:'OpenAI 兼容',    st:'on',  pr:6,  wt:4, used:'$680',    bal:'$1,320', lat:288},
      {id:114,name:'Together AI',    type:'OpenAI 兼容',    st:'on',  pr:5,  wt:3, used:'$540',    bal:'$960',   lat:472},
      {id:115,name:'Groq 高速',      type:'OpenAI 兼容',    st:'on',  pr:7,  wt:5, used:'$390',    bal:'$610',   lat:142},
      {id:116,name:'Bedrock Claude', type:'Anthropic',      st:'man', pr:6,  wt:4, used:'$1,480',  bal:'$520',   lat:0}
    ];
    var stMap={
      on:  {cls:'b-suc',     tone:'--color-success',    lab:'启用'},
      man: {cls:'b-neutral', tone:'--color-text-muted', lab:'手动禁用'},
      auto:{cls:'b-dan',     tone:'--color-danger',     lab:'自动禁用'},
      warn:{cls:'b-warn',    tone:'--color-warning',    lab:'限流告警'}
    };

    function badge(st){
      var s=stMap[st];
      return '<span class="badge '+s.cls+'"><span class="dot" style="background:var('+s.tone+')"></span>'+s.lab+'</span>';
    }
    function latCell(v){
      if(!v) return '<span class="muted cellmono">—</span>';
      return '<span class="cellmono">'+v+' ms</span>';
    }

    var tbody=document.getElementById('tbody');
    tbody.innerHTML=data.map(function(r){
      return '<tr>'+
        '<td><input type="checkbox" class="rowchk" aria-label="选择 '+r.name+'"></td>'+
        '<td class="cellmono muted">'+r.id+'</td>'+
        '<td>'+r.name+'</td>'+
        '<td class="muted">'+r.type+'</td>'+
        '<td>'+badge(r.st)+'</td>'+
        '<td class="cellmono">'+r.pr+'</td>'+
        '<td class="cellmono">'+r.wt+'</td>'+
        '<td><span class="cellmono">'+r.used+'</span> <span class="muted">/ '+r.bal+'</span></td>'+
        '<td>'+latCell(r.lat)+'</td>'+
        '<td class="cellmono muted">06-20 04:'+(10+(r.id%50)).toString().padStart(2,'0')+'</td>'+
        '<td><div class="row-acts">'+
          '<a class="doTest">测试</a><a class="doEdit">编辑</a>'+
          '<a>'+(r.st==='man'||r.st==='auto'?'启用':'禁用')+'</a>'+
          '<a class="dang">删除</a></div></td>'+
      '</tr>';
    }).join('');
    document.getElementById('pgInfo').textContent='共 '+data.length+' 个渠道';

    // ════ 批量选择 ════
    var chkAll=document.getElementById('chkAll');
    var batchbar=document.getElementById('batchbar');
    var batchCnt=document.getElementById('batchCnt');
    function refreshBatch(){
      var sel=tbody.querySelectorAll('.rowchk:checked').length;
      batchbar.classList.toggle('on', sel>0);
      batchCnt.textContent='已选 '+sel+' 项';
    }
    chkAll.addEventListener('change', function(){
      tbody.querySelectorAll('.rowchk').forEach(function(c){ c.checked=chkAll.checked; });
      refreshBatch();
    });
    tbody.addEventListener('change', function(e){
      if(e.target.classList.contains('rowchk')) refreshBatch();
    });

    // ════ 抽屉 ════
    var scrim=document.getElementById('drawerScrim');
    var drawer=document.getElementById('drawer');
    function openD(){ scrim.classList.add('on'); drawer.classList.add('on'); }
    function closeD(){ scrim.classList.remove('on'); drawer.classList.remove('on'); }
    document.getElementById('newCh').addEventListener('click', function(){
      drawer.querySelector('.drawer-title').textContent='新建渠道'; openD();
    });
    document.getElementById('drawerX').addEventListener('click', closeD);
    document.getElementById('drawerCancel').addEventListener('click', closeD);
    scrim.addEventListener('click', closeD);
    tbody.addEventListener('click', function(e){
      if(e.target.classList.contains('doEdit')){
        drawer.querySelector('.drawer-title').textContent='编辑渠道'; openD();
      }
    });

    // 标签输入：回车添加 / 点 × 删除
    var keyTags=document.getElementById('keyTags');
    var keyInput=keyTags.querySelector('input');
    keyInput.addEventListener('keydown', function(e){
      if(e.key==='Enter' && keyInput.value.trim()){
        e.preventDefault();
        var span=document.createElement('span');
        span.className='tag';
        span.innerHTML=keyInput.value.trim()+' <b>×</b>';
        keyTags.insertBefore(span, keyInput);
        keyInput.value='';
      }
    });
    keyTags.addEventListener('click', function(e){
      if(e.target.tagName==='B') e.target.parentNode.remove();
    });
  })();
  </script>
</body>
</html>
