  # ==================== 模块六：Relay 网关多协议中转 ====================
  /v1/chat/completions:
    post:
      tags: [relay]
      summary: OpenAI Chat Completions 中转
      x-function-id: F-3026
      description: |
        TokenAuth（RelayFormatOpenAI）。客户输入 model=C，内部经 C→A→B 两层映射（客户不感知）。
        响应按入站协议 openai 原样返回，不暴露 B/渠道/成本。统一中间件错误 + 统一上游错误处置。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenAIChatCompletionRequest'
      responses:
        '200':
          description: 标准 OpenAI chat.completion / chat.completion.chunk（流式 SSE）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE 流式 chat.completion.chunk
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: 预扣额度不足（BL-2 SkipRetry，不重试）/ 模型或 IP 白名单未命中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: ModelRequestRateLimit 超限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
