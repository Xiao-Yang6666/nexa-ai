      in: query
      schema:
        type: integer
        format: int64

paths:
  # ==================== 模块一：账号与身份 ====================
  /api/user/register:
    post:
      tags: [account]
      summary: 邮箱密码注册
      x-function-id: F-1001
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  maxLength: 20
                password:
                  type: string
                  minLength: 8
                  maxLength: 20
                email:
                  type: string
                  maxLength: 50
                verification_code:
                  type: string
                  description: EmailVerificationEnabled=true 时必填（F-1005）
                aff_code:
                  type: string
                  description: 邀请码（F-1040 归因）
              required: [username, password]
      responses:
        '200':
          description: 注册成功（不下发 password/access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
  /api/user/login:
    post:
      tags: [account]
      summary: 邮箱密码登录
      x-function-id: F-1002
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: 登录标识，可填用户名或邮箱（后端先按用户名匹配，查不到再按邮箱兜底匹配，二选一均可登入）。
                password:
                  type: string
              required: [username, password]
      responses:
        '200':
