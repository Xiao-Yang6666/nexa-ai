openapi: 3.0.3
info:
  title: Nexa API
  version: 1.0.0
  description: |
    Nexa — AI API 网关 SaaS（基于 new-api 二次开发，Go + Gin + GORM）的机读 API 契约。
    本文件由人读版权威契约 `API-ENDPOINTS.md`（§1-§16）翻译而来，供前端 mock / 生成 client 用。

    产品铁律（贯穿所有出参 DTO）：
    1. 客户视图 DTO（*UserView/*PublicView）绝不含：成本（quota_cost）、利润（quota_profit）、
       上游真实模型 B（actual_upstream_model / upstream_name / upstream_model）、供应商渠道维
       （channel_id / channel_name）、cost_ratio。
    2. 管理视图 DTO（*AdminView）给全链 C→A→B + 协议 + 售价/成本/利润 + channel_id。
    3. 凡涉及 key/secret 的字段：列表脱敏（MaskTokenKey），取明文走 CriticalRateLimit + DisableCache + 二次验证。

    通用响应包络（new-api 惯例）：{ "success": bool, "message": string, "data": <payload> }。
    分页响应 data 形如 { "items": [...], "total": int, "page": int, "page_size": int }。

    Relay 对外 schema 铁律：所有 /v1/*、/v1beta/* 入口的对外 API schema = 标准 OpenAI / Anthropic / Gemini
    原生格式；内部 C→A→B 两层映射、选渠、协议头尾转换、双价记账对客户完全不感知。
servers:
  - url: https://nexa.ai
    description: Nexa 生产环境
security: []
tags:
  - name: account
    description: 账号与身份（D1，模块一）
  - name: token
    description: 令牌管理（模块二）
  - name: billing
    description: 计费与额度（D6，模块三）
  - name: model
    description: 模型广场/元数据/同步/供应商/对外目录/映射（D8，模块四）
  - name: channel
    description: 渠道管理与上游路由/运维/成本（D7，模块五）
  - name: relay
    description: Relay 网关多协议中转（D9/D11/D13，模块六）
  - name: task
    description: 异步任务中心（视频/音乐/MJ，D5，模块七）
  - name: log
    description: 日志与用量（D4/D5，模块八）
  - name: ops
    description: 运营与运维 / 系统设置 / 选项配置 / 性能监控 / 合规（模块九）
  - name: deployment
    description: 部署管理（io.net 企业部署，模块十）
  - name: public
    description: 公开站点（营销站 / 协议隐私页 / 状态聚合，模块十一）
  - name: growth
    description: 增长（签到 / 邀请分销 / Telegram，模块十二）
  - name: playground
    description: Playground 站内对话试用（模块十三）
  - name: ranking
    description: 用量排行榜快照（模块十六）
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: sk-nexa-...
      description: |
        API Key（sk-nexa 前缀）鉴权，用于 /v1/* 与 /v1beta/* 的 relay 中转端点（TokenAuth）。
        Header: `Authorization: Bearer sk-nexa-...`。Claude 原生另支持 `x-api-key` + `anthropic-version`，
        Gemini 原生另支持 `x-goog-api-key` 或 query key。
    tokenReadAuth:
      type: http
      scheme: bearer
      bearerFormat: sk-nexa-...
      description: |
        TokenAuthReadOnly：Bearer sk-key 只读鉴权，用于按 key 查用量/日志（/api/usage/token、/api/log/token）。
        附加 CriticalRateLimit + DisableCache。
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: |
        UserAuth（会话/cookie 或 access token）。用于 /api/user/self/* 等 self-scope 端点，
        按 user_id 强制过滤越权。普通用户角色（common+）。部分高危动作要求 dashboard 会话（拒绝 access token）。
    adminAuth:
      type: apiKey
      in: cookie
      name: session
      description: |
        AdminAuth（admin+ 角色）。基于会话鉴权，要求 Role >= admin。用于用户管理、渠道/模型/计费配置、
        管理端日志、部署管理等。越权路由返回 403（F-5031）。文档层用同一会话凭据 + 角色级别区分。
    rootAuth:
      type: apiKey
      in: cookie
      name: session
      description: |
        RootAuth（root 角色）。基于会话鉴权，要求 Role == root。用于全站 Option 配置、性能监控运维、
        支付合规确认、自定义 OAuth provider 配置等。部分端点额外要求 dashboard 会话。
  schemas:
    # ============ 通用响应包络 ============
    ApiResponse:
      type: object
      description: 通用响应包络（new-api 惯例）
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
          description: 业务载荷，按端点不同而不同
      required:
        - success
    SuccessResponse:
      type: object
      description: 仅 success 的成功响应（多数状态变更/删除端点）
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          nullable: true
      required:
        - success
    Pagination:
      type: object
      description: 分页元数据（data 内）
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    ErrorResponse:
      type: object
      description: 业务错误响应（success=false）
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        data:
          nullable: true
      required:
        - success
        - message

    # ============ 账号与身份 DTO（模块一） ============
    UserView:
      type: object
      description: |
        用户客户视图（self-scope / 登录返回）。裁掉 password/access_token/remark(普通用户)/setting内部。
        不下发 password、access_token。
      properties:
        id:
          type: integer
        username:
          type: string
        display_name:
          type: string
        role:
          type: integer
          description: 1=common, 10=admin, 100=root（角色编码，护栏不可操作 >= 自身角色）
        status:
          type: integer
          description: 1=启用，其它=禁用
        group:
          type: string
        quota:
          type: integer
        used_quota:
          type: integer
        request_count:
          type: integer
        aff_code:
          type: string
        aff_count:
          type: integer
        aff_quota:
          type: integer
        aff_history_quota:
          type: integer
        email:
          type: string
        github_id:
          type: string
        discord_id:
          type: string
        wechat_id:
          type: string
        telegram_id:
          type: string
        linux_do_id:
          type: string
        oidc_id:
          type: string
        last_login_at:
          type: integer
          format: int64
        setting:
          type: object
          description: dto.UserSetting，仅本人信息端点下发
          additionalProperties: true
    UserAdminView:
      type: object
      description: |
        用户管理视图（AdminAuth）。含 remark / inviter_id（区别于 UserView）。
      properties:
        id:
          type: integer
        username:
          type: string
        display_name:
          type: string
        role:
          type: integer
        status:
          type: integer
        email:
          type: string
        group:
          type: string
        quota:
          type: integer
        used_quota:
          type: integer
        request_count:
          type: integer
        aff_code:
          type: string
        aff_count:
          type: integer
        inviter_id:
          type: integer
        remark:
          type: string
        github_id:
          type: string
        discord_id:
          type: string
        wechat_id:
          type: string
        telegram_id:
          type: string
        last_login_at:
          type: integer
          format: int64
        created_at:
          type: integer
          format: int64
        setting:
          type: object
          additionalProperties: true
          description: 单用户详情时含 setting
    AdminBalanceAdjustRequest:
      type: object
      description: 管理员充值/扣费请求（amount 以 USD 计）
      properties:
        amount:
          type: number
          description: USD 金额（> 0）
        remark:
          type: string
      required: [amount]
    BalanceTransactionView:
      type: object
      description: 账变流水视图（amount/balance_after 以 USD 计）
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [ADMIN_CREDIT, ADMIN_DEBIT, REDEEM, TOPUP]
        amount:
          type: number
          description: 变动额（USD，带正负）
        balance_after:
          type: number
          description: 变动后余额（USD）
        operator_id:
          type: integer
          format: int64
        remark:
          type: string
        created_time:
          type: integer
          format: int64
    UserSetting:
      type: object
      description: 个人设置（dto.UserSetting）；含语言/边栏偏好与额度预警配置（F-4037）
      additionalProperties: true
      properties:
        warning_type:
          type: string
          enum: [email, webhook, bark]
        warning_threshold:
          type: number
          description: 预警阈值（必须为正数）
        webhook_url:
          type: string
        webhook_secret:
          type: string
        bark_url:
          type: string
    OAuthBindingView:
      type: object
      description: 用户 OAuth 绑定项（管理端查询）
      properties:
        id:
          type: integer
        provider_id:
          type: integer
        provider_user_id:
          type: string
        created_at:
          type: string
          format: date-time
    CustomOAuthProviderView:
      type: object
      description: 自定义 OAuth provider 配置（RootAuth；client_secret 受保护）
      properties:
        id:
          type: integer
        name:
          type: string
        client_id:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        userinfo_endpoint:
          type: string
        scopes:
          type: array
          items:
            type: string
    PasskeyView:
      type: object
      description: 本人 Passkey 状态（不下发 public_key 全文）
      properties:
        id:
          type: integer
        credential_id:
          type: string
        attestation_type:
          type: string
        sign_count:
          type: integer
        attachment:
          type: string

    # ============ 令牌管理 DTO（模块二） ============
    TokenUserView:
      type: object
      description: |
        令牌客户视图（self-scope）。key 字段经 MaskTokenKey 脱敏（列表/创建/更新场景）。
        绝不含成本/供应商/上游字段。
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
          description: 脱敏 key（MaskTokenKey）
        status:
          type: integer
        remain_quota:
          type: integer
        unlimited_quota:
          type: boolean
        used_quota:
          type: integer
        expired_time:
          type: integer
          format: int64
          description: -1=永不过期
        group:
          type: string
        model_limits_enabled:
          type: boolean
        model_limits:
          type: string
          description: JSON 字符串，允许模型列表（减法约束）
        allow_ips:
          type: string
        cross_group_retry:
          type: boolean
        accessed_time:
          type: integer
          format: int64
        created_time:
          type: integer
          format: int64
    TokenCreateRequest:
      type: object
      description: 创建/更新令牌入参
      properties:
        name:
          type: string
          maxLength: 50
        remain_quota:
          type: integer
          description: unlimited_quota=false 时校验 [0, 10亿*QuotaPerUnit]
        unlimited_quota:
          type: boolean
        expired_time:
          type: integer
          format: int64
          default: -1
        model_limits_enabled:
          type: boolean
        model_limits:
          type: string
          description: JSON 字符串
        allow_ips:
          type: string
          description: 按换行切分，空=不限 IP
        group:
          type: string
          description: 调用分组（auto 时 cross_group_retry 生效）
        cross_group_retry:
          type: boolean
      required:
        - name
    UsageCreditSummary:
      type: object
      description: 令牌用量（OpenAI 兼容，credit_summary）
      properties:
        object:
          type: string
          example: credit_summary
        total_granted:
          type: number
          description: RemainQuota + UsedQuota
        total_used:
          type: number
          description: UsedQuota
        total_available:
          type: number
        expires_at:
          type: integer
          format: int64
          description: ExpiredTime=-1 时归零
        model_limits:
          type: string
        model_limits_enabled:
          type: boolean

    # ============ 计费与额度 DTO（模块三） ============
    TopUpRequest:
      type: object
      properties:
        amount:
          type: integer
          format: int64
          description: 充值额度（quota 单位）
        money:
          type: number
          format: double
          description: 支付金额
        payment_method:
          type: string
          enum: [stripe, creem, waffo, waffo_pancake, balance]
        payment_provider:
          type: string
          description: epay / stripe / ...
    TopUpUserView:
      type: object
      description: 充值下单结果（客户视图，不下发 Other 内部）
      properties:
        trade_no:
          type: string
        pay_url:
          type: string
        pay_params:
          type: object
          additionalProperties: true
        status:
          type: string
          example: pending
    RedemptionCreateRequest:
      type: object
      properties:
        name:
          type: string
        quota:
          type: integer
          default: 100
        count:
          type: integer
          description: 批量数量
        expired_time:
          type: integer
          format: int64
          description: 0=不过期
    RedemptionAdminView:
      type: object
      description: 兑换码管理视图
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
        status:
          type: integer
        quota:
          type: integer
        created_time:
          type: integer
          format: int64
        redeemed_time:
          type: integer
          format: int64
        used_user_id:
          type: integer
        expired_time:
          type: integer
          format: int64
    SubscriptionPlanUserView:
      type: object
      description: 订阅套餐客户视图（裁掉 upgrade_group/downgrade_group/stripe_price_id 等内部）
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
        price_amount:
          type: number
        currency:
          type: string
        duration_unit:
          type: string
        duration_value:
          type: integer
        custom_seconds:
          type: integer
        total_amount:
          type: number
        quota_reset_period:
          type: string
        max_purchase_per_user:
          type: integer
        sort_order:
          type: integer
        enabled:
          type: boolean
    SubscriptionPlanAdminView:
      type: object
      description: 订阅套餐管理视图（全字段，含内部分组与商品号）
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
        price_amount:
          type: number
        currency:
          type: string
        duration_unit:
          type: string
        duration_value:
          type: integer
        custom_seconds:
          type: integer
        total_amount:
          type: number
        allow_balance_pay:
          type: boolean
        allow_wallet_overflow:
          type: boolean
        quota_reset_period:
          type: string
        max_purchase_per_user:
          type: integer
        upgrade_group:
          type: string
        downgrade_group:
          type: string
        stripe_price_id:
          type: string
        sort_order:
          type: integer
        enabled:
          type: boolean
    SubscriptionPlanCreateRequest:
      type: object
      description: 创建订阅套餐入参（SubscriptionPlan 全字段）
      properties:
        title:
          type: string
        price_amount:
          type: number
        currency:
          type: string
        duration_unit:
          type: string
        duration_value:
          type: integer
        total_amount:
          type: number
        allow_balance_pay:
          type: boolean
        allow_wallet_overflow:
          type: boolean
        quota_reset_period:
          type: string
        upgrade_group:
          type: string
        downgrade_group:
          type: string
      required:
        - title
        - price_amount
    SubscriptionOrderRequest:
      type: object
      properties:
        plan_id:
          type: integer
        payment_method:
          type: string
        payment_provider:
          type: string
      required:
        - plan_id
    UserSubscriptionView:
      type: object
      description: 本人订阅项（客户视图）
      properties:
        id:
          type: integer
        plan_id:
          type: integer
        amount_total:
          type: number
        amount_used:
          type: number
        start_time:
          type: integer
          format: int64
        end_time:
          type: integer
          format: int64
        status:
          type: string
          enum: [active, expired, cancelled]
        allow_wallet_overflow:
          type: boolean
    RatioConfigAdminView:
      type: object
      description: 倍率配置（管理视图）
      properties:
        model_ratio:
          type: object
          additionalProperties: true
        group_ratio:
          type: object
          additionalProperties: true
        completion_ratio:
          type: object
          additionalProperties: true
        cache_ratio:
          type: object
          additionalProperties: true
    ProfitDashboardItem:
      type: object
      description: 利润分析看板项（AdminView，含成本/利润，仅 admin/root）
      properties:
        dimension_key:
          type: string
          description: 维度键（model→A / channel→channel_name / group）
        sum_quota_sell:
          type: integer
        sum_quota_cost:
          type: integer
        sum_quota_profit:
          type: integer
        profit_rate:
          type: number
          description: profit / sell
        cost_missing_count:
          type: integer
    PricingPublicView:
      type: object
      description: 公开模型价格页（客户/公开视图，绝不含 B/成本/供应商）
      properties:
        models:
          type: array
          items:
            type: object
            properties:
              model_name:
                type: string
                description: 对外名 A
              base_price_ratio:
                type: number
                description: 基准价（折扣=1 口径）
              display_name:
                type: string
              description:
                type: string
              groups:
                type: array
                description: 该模型所在的可见价格分组及倍率（分组价格对比，仅公开 PUBLIC 子集，零泄露）
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: 分组展示名
                    code:
                      type: string
                      description: 分组编码
                    ratio:
                      type: number
                      description: 分组售价倍率（售价 = base_price_ratio × ratio）
              supported_endpoint:
                type: string
              cache_ratio:
                type: number
        group_ratio:
          type: object
          additionalProperties: true
          description: 仅可用分组
        auto_groups:
          type: array
          items:
            type: string
        pricing_version:
          type: string

    # ============ 模型与供应商 DTO（模块四） ============
    ModelMetaAdminView:
      type: object
      description: 模型元数据管理视图（enrich 后含计数）
      properties:
        id:
          type: integer
        model_name:
          type: string
        status:
          type: integer
        description:
          type: string
        icon:
          type: string
        tags:
          type: string
        vendor_id:
          type: integer
        endpoints:
          type: string
        name_rule:
          type: string
        sync_official:
          type: integer
        created_time:
          type: integer
          format: int64
        updated_time:
          type: integer
          format: int64
    ModelMetaCreateRequest:
      type: object
      properties:
        model_name:
          type: string
        description:
          type: string
        icon:
          type: string
        tags:
          type: string
        vendor_id:
          type: integer
        endpoints:
          type: string
        name_rule:
          type: string
      required:
        - model_name
    ModelMetaUpdateRequest:
      type: object
      properties:
        id:
          type: integer
        status_only:
          type: boolean
          description: true 仅改 status，不动其他字段
        status:
          type: integer
        model_name:
          type: string
        description:
          type: string
        icon:
          type: string
        tags:
          type: string
        vendor_id:
          type: integer
        endpoints:
          type: string
        name_rule:
          type: string
      required:
        - id
    VendorAdminView:
      type: object
      description: 供应商元数据管理视图
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        status:
          type: integer
    VendorWriteRequest:
      type: object
      properties:
        id:
          type: integer
          description: 更新时必填
        name:
          type: string
        icon:
          type: string
        status:
          type: integer
    ModelSyncDiff:
      type: object
      description: 上游模型同步预览差异（不写库）
      properties:
        diff:
          type: object
          properties:
            to_create_models:
              type: array
              items:
                type: string
            to_create_vendors:
              type: array
              items:
                type: string
            to_update_models:
              type: array
              items:
                type: string
            to_skip_models:
              type: array
              items:
                type: string
    ModelSyncResult:
      type: object
      description: 上游模型同步执行结果计数
      properties:
        created_models:
          type: integer
        created_vendors:
          type: integer
        updated_models:
          type: integer
        skipped_models:
          type: integer
    PublicModelAdminView:
      type: object
      description: 对外模型商品目录管理视图（含售价/上下架/品质）
      properties:
        id:
          type: integer
        public_name:
          type: string
          description: 对外名 A
        base_price_ratio:
          type: number
        use_price:
          type: boolean
        base_price:
          type: number
        enabled:
          type: boolean
        display_name:
          type: string
        sort_order:
          type: integer
        description:
          type: string
        created_time:
          type: integer
          format: int64
        updated_time:
          type: integer
          format: int64
    PublicModelUserView:
      type: object
