<!DOCTYPE html>
<html lang="zh-CN" data-scheme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兑换码管理 · Nexa·AI 管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="../assets/tokens.css">
<script src="admin-shell.js"></script>
<style>
  /* 兑换码管理专属 —— 全 token 驱动，零裸色值 */
  .gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);margin-bottom:var(--space-5)}
  .gen-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-sm);padding:var(--space-5)}
  .gen-card h3{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-brand);font-size:var(--text-h5);
    font-weight:var(--fw-bold);color:var(--color-text);margin:0 0 var(--space-4)}
  .gen-card h3 .nx-ic{color:var(--color-primary-500);width:18px;height:18px}
  .gen-fields{display:flex;flex-direction:column;gap:var(--space-3)}
  .gen-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
  .gen-foot{display:flex;align-items:center;gap:var(--space-3);margin-top:var(--space-4)}
  .gen-foot .grow{margin-left:auto}
  .result-box{display:none;margin-top:var(--space-4);padding:var(--space-3) var(--space-4);
    background:var(--color-surface-sunken);border:1px solid var(--color-border);border-radius:var(--radius-sm)}
  .result-box.on{display:block}
  .result-box .code{font-family:var(--font-mono);font-size:var(--text-body);color:var(--color-success);
    display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)}
  .result-box .code a{color:var(--color-primary-500);font-size:var(--text-body-sm);cursor:pointer;white-space:nowrap}
  .result-list{display:flex;flex-direction:column;gap:6px;max-height:148px;overflow-y:auto}
  .result-list .ci{font-family:var(--font-mono);font-size:var(--text-body-sm);color:var(--color-text-secondary);
    padding:4px var(--space-3);background:var(--color-bg-subtle);border-radius:var(--radius-xs)}
  .filterbar{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)}
  .filterbar .sel,.filterbar .srch{height:36px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
    background:var(--color-bg-elevated);color:var(--color-text);font-family:inherit;font-size:var(--text-body-sm);padding:0 var(--space-3)}
  .filterbar .srch{min-width:220px}
  .filterbar .sel:focus,.filterbar .srch:focus{outline:none;border-color:var(--color-primary-500);box-shadow:var(--focus-ring)}
  .filterbar .grow{margin-left:auto}
  .batchbar{display:none;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3);
    padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);
    background:color-mix(in oklch,var(--color-primary-500) 10%,transparent);
    border:1px solid color-mix(in oklch,var(--color-primary-500) 30%,transparent)}
  .batchbar.on{display:flex}
  .batchbar .cnt{font-size:var(--text-body-sm);color:var(--color-primary-700);font-weight:var(--fw-medium)}
  .batchbar .grow{margin-left:auto}
  .table-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-sm);overflow:hidden}
  .table-wrap{overflow-x:auto}
  .table-wrap table{min-width:1080px}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable .arr{display:inline-flex;vertical-align:middle;color:var(--color-text-muted);margin-left:4px}
  .cellmono{font-family:var(--font-mono)}
  tr.used td,tr.expired td{color:var(--color-text-muted)}
  .row-acts{display:flex;gap:var(--space-3);white-space:nowrap}
  .row-acts a{font-size:var(--text-body-sm);color:var(--color-primary-500);cursor:pointer}
  .row-acts a:hover{color:var(--color-primary-600)}
  .row-acts a.dang{color:var(--color-danger)}
  .pager{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-5);
    border-top:1px solid var(--color-border);font-size:var(--text-body-sm);color:var(--color-text-muted)}
  @media (max-width:1024px){.gen-grid{grid-template-columns:1fr}}
  @media (max-width:560px){.filterbar .srch{min-width:140px}.gen-row{grid-template-columns:1fr}}
</style>
</head>
<body data-page="redeem" data-title="兑换码管理" data-crumb="管理后台|运营|兑换码">

  <!-- 顶部生成卡 -->
  <section class="gen-grid">
    <!-- 单个生成 -->
    <div class="gen-card nx-fade">
      <h3>
        <svg class="nx-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4z"/><path d="M14 6v12"/></svg>
        生成单个兑换码
      </h3>
      <div class="gen-fields">
        <div>
          <label class="field-label">面额（美元）</label>
          <input class="input cellmono" id="s_amount" value="20">
        </div>
        <div>
          <label class="field-label">有效期（天）</label>
          <input class="input cellmono" id="s_days" value="90">
        </div>
      </div>
      <div class="gen-foot">
        <span class="grow"></span>
        <button class="btn btn-primary" id="genSingle">生成</button>
      </div>
      <div class="result-box" id="singleResult">
        <div class="code"><span id="singleCode">—</span><a id="copySingle">复制</a></div>
      </div>
    </div>

    <!-- 批量生成 -->
    <div class="gen-card nx-fade">
      <h3>
        <svg class="nx-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        批量生成
      </h3>
      <div class="gen-fields">
        <div class="gen-row">
          <div>
            <label class="field-label">数量</label>
            <input class="input cellmono" id="b_count" value="50">
          </div>
          <div>
            <label class="field-label">面额（美元）</label>
            <input class="input cellmono" id="b_amount" value="10">
          </div>
        </div>
        <div>
          <label class="field-label">有效期（天）</label>
          <input class="input cellmono" id="b_days" value="180">
        </div>
      </div>
      <div class="gen-foot">
        <span class="muted" id="batchNote">单批最多 1000 个</span>
        <span class="grow"></span>
        <button class="btn btn-sec btn-sm" id="exportBatch">导出</button>
        <button class="btn btn-primary" id="genBatch">批量生成</button>
      </div>
      <div class="result-box" id="batchResult">
        <div class="result-list" id="batchList"></div>
      </div>
    </div>
  </section>

  <!-- FilterBar -->
  <section class="filterbar nx-fade">
    <select class="sel" id="fStatus">
      <option value="">全部状态</option>
      <option value="unused">未使用</option>
      <option value="used">已使用</option>
      <option value="expired">已过期</option>
    </select>
    <select class="sel" id="fBatch">
      <option value="">全部批次</option>
      <option>B-20260601</option>
      <option>B-20260610</option>
      <option>B-20260615</option>
      <option>单个生成</option>
    </select>
    <input class="srch" id="fSearch" type="search" placeholder="搜索兑换码 / 使用者">
    <span class="grow"></span>
  </section>

  <!-- BatchBar -->
  <section class="batchbar" id="batchbar">
    <span class="cnt" id="batchCnt">已选 0 项</span>
    <span class="grow"></span>
    <button class="btn btn-danger btn-sm">批量作废</button>
  </section>

  <!-- 兑换码列表 -->
  <section class="table-card nx-fade">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:34px"><input type="checkbox" id="chkAll" aria-label="全选"></th>
            <th>兑换码</th>
            <th class="sortable">面额 <span class="arr"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th>状态</th>
            <th>使用者</th>
            <th class="sortable">创建时间 <span class="arr"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th class="sortable">过期时间 <span class="arr"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l3-3 3 3M5 10l3 3 3-3"/></svg></span></th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span id="pgInfo">共 0 个兑换码</span>
    </div>
  </section>

  <script src="admin-shell.js"></script>
  <script>
  (function(){
    NexaShell.mount();

    // ════ 兑换码数据（14+ 行，状态多样） ════
    var data=[
      {code:'NEXA-A1B2-****-9X7K', amt:20, st:'unused', user:'—',          ct:'06-15 09:00', exp:'09-13 09:00', batch:'B-20260615'},
      {code:'NEXA-C3D4-****-8M2P', amt:20, st:'used',   user:'alice.chen', ct:'06-15 09:00', exp:'09-13 09:00', batch:'B-20260615'},
      {code:'NEXA-E5F6-****-7N4Q', amt:10, st:'unused', user:'—',          ct:'06-10 10:30', exp:'12-07 10:30', batch:'B-20260610'},
      {code:'NEXA-G7H8-****-6R8S', amt:10, st:'used',   user:'bob.li',     ct:'06-10 10:30', exp:'12-07 10:30', batch:'B-20260610'},
      {code:'NEXA-I9J0-****-5T1U', amt:50, st:'unused', user:'—',          ct:'06-01 08:00', exp:'08-30 08:00', batch:'B-20260601'},
      {code:'NEXA-K1L2-****-4V3W', amt:50, st:'used',   user:'carol.wang', ct:'06-01 08:00', exp:'08-30 08:00', batch:'B-20260601'},
      {code:'NEXA-M3N4-****-3X5Y', amt:5,  st:'expired',user:'—',          ct:'03-12 14:20', exp:'06-10 14:20', batch:'B-20260601'},
      {code:'NEXA-O5P6-****-2Z7A', amt:5,  st:'expired',user:'—',          ct:'03-12 14:20', exp:'06-10 14:20', batch:'B-20260601'},
      {code:'NEXA-Q7R8-****-1B9C', amt:100,st:'unused', user:'—',          ct:'06-18 16:45', exp:'12-15 16:45', batch:'单个生成'},
      {code:'NEXA-S9T0-****-0D2E', amt:100,st:'used',   user:'dave.zhao',  ct:'06-12 11:10', exp:'09-10 11:10', batch:'单个生成'},
      {code:'NEXA-U1V2-****-9F4G', amt:10, st:'unused', user:'—',          ct:'06-10 10:30', exp:'12-07 10:30', batch:'B-20260610'},
      {code:'NEXA-W3X4-****-8H6I', amt:10, st:'used',   user:'alice.chen', ct:'06-10 10:30', exp:'12-07 10:30', batch:'B-20260610'},
      {code:'NEXA-Y5Z6-****-7J8K', amt:20, st:'expired',user:'—',          ct:'02-28 09:00', exp:'05-29 09:00', batch:'B-20260601'},
      {code:'NEXA-A7B8-****-6L0M', amt:20, st:'unused', user:'—',          ct:'06-15 09:00', exp:'09-13 09:00', batch:'B-20260615'},
      {code:'NEXA-C9D0-****-5N2O', amt:50, st:'used',   user:'bob.li',     ct:'06-01 08:00', exp:'08-30 08:00', batch:'B-20260601'}
    ];
    var stMap={
      unused: {cls:'b-suc',     tone:'--color-success',    lab:'未使用'},
      used:   {cls:'b-neutral', tone:'--color-text-muted', lab:'已使用'},
      expired:{cls:'b-dan',     tone:'--color-danger',     lab:'已过期'}
    };
    function stBadge(s){
      var m=stMap[s];
      return '<span class="badge '+m.cls+'"><span class="dot" style="background:var('+m.tone+')"></span>'+m.lab+'</span>';
    }

    var tbody=document.getElementById('tbody'), pgInfo=document.getElementById('pgInfo');
    var fStatus=document.getElementById('fStatus'), fBatch=document.getElementById('fBatch'), fSearch=document.getElementById('fSearch');

    function render(){
      var kw=fSearch.value.trim().toLowerCase();
      var rows=data.filter(function(r){
        if(fStatus.value && r.st!==fStatus.value) return false;
        if(fBatch.value && r.batch!==fBatch.value) return false;
        if(kw && r.code.toLowerCase().indexOf(kw)<0 && r.user.toLowerCase().indexOf(kw)<0) return false;
        return true;
      });
      tbody.innerHTML=rows.map(function(r){
        var cls = r.st==='used'?'used':(r.st==='expired'?'expired':'');
        var acts = r.st==='unused'
          ? '<a class="copyRow">复制</a><a class="dang">作废</a>'
          : '<a class="copyRow">复制</a>';
        return '<tr class="'+cls+'">'+
          '<td><input type="checkbox" class="rowchk" aria-label="选择 '+r.code+'"></td>'+
          '<td class="cellmono">'+r.code+'</td>'+
          '<td class="cellmono">$'+r.amt+'</td>'+
          '<td>'+stBadge(r.st)+'</td>'+
          '<td class="cellmono">'+(r.user==='—'?'<span class="muted">—</span>':r.user)+'</td>'+
          '<td class="cellmono muted">'+r.ct+'</td>'+
          '<td class="cellmono muted">'+r.exp+'</td>'+
          '<td><div class="row-acts">'+acts+'</div></td>'+
        '</tr>';
      }).join('') || '<tr><td colspan="8" class="muted" style="text-align:center;padding:var(--space-6)">无匹配兑换码</td></tr>';
      pgInfo.textContent='共 '+rows.length+' 个兑换码';
    }
    [fStatus,fBatch].forEach(function(el){ el.addEventListener('change', render); });
    fSearch.addEventListener('input', render);
    render();

    // 随机码生成（仅前端演示）
    function rand(n){ var s='',c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; for(var i=0;i<n;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
    function newCode(){ return 'NEXA-'+rand(4)+'-'+rand(4)+'-'+rand(4); }

    // 单个生成
    var singleResult=document.getElementById('singleResult'), singleCode=document.getElementById('singleCode');
    document.getElementById('genSingle').addEventListener('click', function(){
      singleCode.textContent=newCode();
      singleResult.classList.add('on');
    });
    document.getElementById('copySingle').addEventListener('click', function(){
      if(navigator.clipboard) navigator.clipboard.writeText(singleCode.textContent);
    });

    // 批量生成
    var batchResult=document.getElementById('batchResult'), batchList=document.getElementById('batchList');
    document.getElementById('genBatch').addEventListener('click', function(){
      var n=Math.max(1,Math.min(1000, parseInt(document.getElementById('b_count').value,10)||1));
      var preview=Math.min(n,30), html='';
      for(var i=0;i<preview;i++) html+='<div class="ci">'+newCode()+'</div>';
      if(n>preview) html+='<div class="ci muted">… 其余 '+(n-preview)+' 个已生成，可导出查看</div>';
      batchList.innerHTML=html;
      batchResult.classList.add('on');
    });
    document.getElementById('exportBatch').addEventListener('click', function(){
      document.getElementById('batchNote').textContent='已导出 CSV';
    });

    // 复制行
    tbody.addEventListener('click', function(e){
      if(e.target.classList.contains('copyRow')){
        var code=e.target.closest('tr').querySelector('.cellmono').textContent;
        if(navigator.clipboard) navigator.clipboard.writeText(code);
        e.target.textContent='已复制';
        setTimeout(function(){ e.target.textContent='复制'; }, 1200);
      }
    });

    // 批量选择
    var chkAll=document.getElementById('chkAll'), batchbar=document.getElementById('batchbar'), batchCnt=document.getElementById('batchCnt');
    function refreshBatch(){
      var sel=tbody.querySelectorAll('.rowchk:checked').length;
      batchbar.classList.toggle('on', sel>0);
      batchCnt.textContent='已选 '+sel+' 项';
    }
    chkAll.addEventListener('change', function(){
      tbody.querySelectorAll('.rowchk').forEach(function(c){ c.checked=chkAll.checked; });
      refreshBatch();
    });
    tbody.addEventListener('change', function(e){
      if(e.target.classList.contains('rowchk')) refreshBatch();
    });
  })();
  </script>
</body>
</html>
