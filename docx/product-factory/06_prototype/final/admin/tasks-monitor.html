<!DOCTYPE html>
<html lang="zh-CN" data-scheme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务监控 · Nexa·AI 管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="../assets/tokens.css">
<script src="admin-shell.js"></script>
<style>
  /* 任务监控专属 —— 全 token 驱动，零裸色值 */
  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--space-4);margin-bottom:var(--space-5)}
  .kpi{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    padding:var(--space-4) var(--space-5);box-shadow:var(--shadow-sm)}
  .kpi-label{font-size:var(--text-body-sm);color:var(--color-text-muted);margin-bottom:var(--space-2)}
  .kpi-val{font-family:var(--font-brand);font-size:var(--text-h3);font-weight:var(--fw-bold);
    color:var(--color-text);line-height:var(--lh-tight);letter-spacing:var(--tracking-tight)}
  .kpi-delta{font-size:var(--text-caption);margin-top:var(--space-2);display:inline-flex;align-items:center;gap:4px}
  .kpi-delta.up{color:var(--color-success)} .kpi-delta.down{color:var(--color-danger)}
  .kpi-delta.flat{color:var(--color-text-muted)}
  /* 告警条 */
  .alert-bar{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5);
    padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);
    background:var(--color-warning-bg);border:1px solid var(--color-warning-border)}
  .alert-bar .nx-ic{color:var(--color-warning);width:20px;height:20px;flex:none}
  .alert-bar .txt{font-size:var(--text-body-sm);color:var(--color-warning-fg)}
  .alert-bar .txt b{font-family:var(--font-mono)}
  .alert-bar .grow{margin-left:auto}
  /* 图表 */
  .chart-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:var(--space-4);margin-bottom:var(--space-5)}
  .chart-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    padding:var(--space-5);box-shadow:var(--shadow-sm)}
  .chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
  .chart-title{font-size:var(--text-h5);font-weight:var(--fw-semibold);color:var(--color-text);margin:0}
  .chart-sub{font-size:var(--text-body-sm);color:var(--color-text-muted)}
  .legend{display:flex;flex-wrap:wrap;gap:var(--space-3);margin-top:var(--space-3);font-size:var(--text-body-sm);
    color:var(--color-text-secondary)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:var(--radius-xs);display:inline-block}
  .ax-txt{font-family:var(--font-mono);font-size:var(--text-overline);fill:var(--color-text-muted)}
  .donut-center{font-family:var(--font-brand);fill:var(--color-text);font-weight:var(--fw-bold)}
  .donut-center-sub{fill:var(--color-text-muted)}
  /* FilterBar / 表格 */
  .filterbar{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)}
  .filterbar .sel,.filterbar .srch{height:36px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
    background:var(--color-bg-elevated);color:var(--color-text);font-family:inherit;font-size:var(--text-body-sm);padding:0 var(--space-3)}
  .filterbar .srch{min-width:200px}
  .filterbar .sel:focus,.filterbar .srch:focus{outline:none;border-color:var(--color-primary-500);box-shadow:var(--focus-ring)}
  .filterbar .grow{margin-left:auto}
  .table-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-sm);overflow:hidden}
  .table-wrap{overflow-x:auto}
  .table-wrap table{min-width:1180px}
  .cellmono{font-family:var(--font-mono)}
  .row-acts{display:flex;gap:var(--space-3);white-space:nowrap}
  .row-acts a{font-size:var(--text-body-sm);color:var(--color-primary-500);cursor:pointer}
  .row-acts a:hover{color:var(--color-primary-600)}
  .row-acts a.dang{color:var(--color-danger)}
  .prog{display:inline-flex;align-items:center;gap:6px}
  .prog .bar{display:inline-block;width:72px;height:6px;border-radius:var(--radius-full);
    background:var(--color-surface-sunken);overflow:hidden;vertical-align:middle}
  .prog .bar i{display:block;height:100%;background:var(--color-primary-500);border-radius:var(--radius-full)}
  .prog .pct{font-family:var(--font-mono);font-size:var(--text-caption);color:var(--color-text-secondary);min-width:36px}
  .pager{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-5);
    border-top:1px solid var(--color-border);font-size:var(--text-body-sm);color:var(--color-text-muted)}
  .pager .pg{display:flex;gap:var(--space-1)}
  .pager .pg button{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
    background:var(--color-bg-elevated);color:var(--color-text-secondary);font-family:inherit;cursor:pointer}
  .pager .pg button.on{background:var(--color-primary-500);color:var(--color-primary-fg);border-color:var(--color-primary-500)}
  @media (max-width:1280px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:1024px){.chart-grid{grid-template-columns:1fr}}
  @media (max-width:560px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body data-page="tasks" data-title="任务监控" data-crumb="管理后台|运营|任务监控"
      data-actions='<button class="btn btn-sec btn-sm" id="refreshBtn">刷新</button>'>

  <!-- KPI 顶行 5 卡 -->
  <section class="kpi-row">
    <div class="kpi nx-fade">
      <div class="kpi-label">今日任务总量</div>
      <div class="kpi-val" data-count="9264">0</div>
      <div class="kpi-delta up">较昨日 +11.5%</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">处理中</div>
      <div class="kpi-val" data-count="148">0</div>
      <div class="kpi-delta flat">队列稳定</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">已完成</div>
      <div class="kpi-val" data-count="8946">0</div>
      <div class="kpi-delta up">成功率 98.4%</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">失败</div>
      <div class="kpi-val" data-count="142">0</div>
      <div class="kpi-delta down">较昨日 +18</div>
    </div>
    <div class="kpi nx-fade">
      <div class="kpi-label">平均耗时</div>
      <div class="kpi-val" data-count="3.8" data-dec="1" data-suffix=" s">0</div>
      <div class="kpi-delta up">较昨日 -0.4s</div>
    </div>
  </section>

  <!-- 超时扫描告警条 -->
  <section class="alert-bar nx-fade">
    <svg class="nx-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
    <span class="txt">超时扫描：检测到 <b>28</b> 个任务超过 30s 阈值，其中 <b>9</b> 个已自动重试，<b>3</b> 个进入死信队列待人工处理。</span>
    <span class="grow"></span>
    <button class="btn btn-sec btn-sm">查看超时清单</button>
  </section>

  <!-- 图表区 1：近7天趋势折线 + 状态环形 -->
  <section class="chart-grid">
    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">近 7 天任务量趋势</h3>
          <div class="chart-sub">完成 / 失败 分线 · 单位：千次</div>
        </div>
      </div>
      <svg id="trend" viewBox="0 0 760 280" width="100%" role="img" aria-label="近7天任务量趋势折线图"></svg>
      <div class="legend" id="trend-legend"></div>
    </div>

    <div class="chart-card nx-fade">
      <div class="chart-head">
        <div>
          <h3 class="chart-title">任务状态分布</h3>
          <div class="chart-sub">当前快照</div>
        </div>
      </div>
      <svg id="donut" viewBox="0 0 240 240" width="100%" height="200" role="img" aria-label="任务状态分布环形图"></svg>
      <div class="legend" id="donut-legend"></div>
    </div>
  </section>

  <!-- 图表区 2：各任务类型耗时横向柱状 -->
  <section class="chart-card nx-fade" style="margin-bottom:var(--space-5)">
    <div class="chart-head">
      <div>
        <h3 class="chart-title">各任务类型平均耗时对比</h3>
        <div class="chart-sub">单位：秒 · P95</div>
      </div>
    </div>
    <svg id="bars" viewBox="0 0 1180 300" width="100%" role="img" aria-label="各任务类型耗时横向柱状图"></svg>
  </section>

  <!-- FilterBar -->
  <section class="filterbar nx-fade">
    <select class="sel" id="fStatus">
      <option value="">全部状态</option>
      <option>排队</option><option>处理中</option><option>已完成</option>
      <option>失败</option><option>超时</option><option>已取消</option>
    </select>
    <select class="sel" id="fType">
      <option value="">全部类型</option>
      <option>对话补全</option><option>嵌入向量</option><option>图像生成</option>
      <option>语音转写</option><option>文档解析</option><option>批量推理</option>
    </select>
    <select class="sel" id="fTime">
      <option>近 1 小时</option><option>近 24 小时</option><option>近 7 天</option>
    </select>
    <input class="srch" id="fSearch" type="search" placeholder="搜索任务 ID / 用户">
    <span class="grow"></span>
    <button class="btn btn-sec btn-sm">导出 CSV</button>
  </section>

  <!-- 全量任务表格 -->
  <section class="table-card nx-fade">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>任务 ID</th><th>类型</th><th>提交用户</th><th>提交时间</th>
            <th>状态</th><th>进度</th><th>耗时</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span id="pgInfo"></span>
      <div class="pg">
        <button>‹</button><button class="on">1</button><button>2</button>
        <button>3</button><button>›</button>
      </div>
    </div>
  </section>

  <script src="admin-shell.js"></script>
  <script>
  (function(){
    NexaShell.mount();
    NexaShell.countAll('[data-count]');
    var cssvar = NexaShell.cssvar;

    // ════ 图表 1：近7天任务量趋势（双折线：完成 / 失败） ════
    (function(){
      var done=[7.8,8.1,7.6,8.4,8.9,8.6,8.95];
      var fail=[0.11,0.13,0.18,0.10,0.16,0.12,0.14];
      var labs=['6/14','6/15','6/16','6/17','6/18','6/19','6/20'];
      var W=760,H=280,pad={l:48,r:18,t:18,b:32};
      var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
      var max=10, min=0;
      var xs=function(i){return pad.l+i*(iw/(done.length-1));};
      var ys=function(v){return pad.t+ih-(v-min)/(max-min)*ih;};
      var svg=document.getElementById('trend');
      var c1=cssvar('--chart-1'), cd=cssvar('--color-danger'), grid=cssvar('--chart-grid');
      var g='';
      for(var t=0;t<=5;t++){
        var v=min+(max-min)*t/5, y=ys(v);
        g+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="'+grid+'" stroke-width="1"/>';
        g+='<text class="ax-txt" x="'+(pad.l-8)+'" y="'+(y+3)+'" text-anchor="end">'+v+'</text>';
      }
      labs.forEach(function(l,d){
        g+='<text class="ax-txt" x="'+xs(d)+'" y="'+(H-10)+'" text-anchor="middle">'+l+'</text>';
      });
      var area='M'+pad.l+' '+ys(0);
      done.forEach(function(v,i){ area+=' L'+xs(i)+' '+ys(v); });
      area+=' L'+xs(done.length-1)+' '+ys(0)+' Z';
      g+='<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">'+
         '<stop offset="0%" stop-color="'+c1+'" stop-opacity="0.28"/>'+
         '<stop offset="100%" stop-color="'+c1+'" stop-opacity="0"/></linearGradient></defs>';
      g+='<path d="'+area+'" fill="url(#tg)"/>';
      g+='<polyline points="'+done.map(function(v,i){return xs(i)+','+ys(v);}).join(' ')+'" fill="none" stroke="'+c1+'" stroke-width="2.4" stroke-linejoin="round"/>';
      g+='<polyline points="'+fail.map(function(v,i){return xs(i)+','+ys(v*10);}).join(' ')+'" fill="none" stroke="'+cd+'" stroke-width="2.2" stroke-dasharray="5 4" stroke-linejoin="round"/>';
      done.forEach(function(v,i){ g+='<circle cx="'+xs(i)+'" cy="'+ys(v)+'" r="3" fill="'+c1+'"/>'; });
      svg.innerHTML=g;
      document.getElementById('trend-legend').innerHTML=
        '<span><i style="background:var(--chart-1)"></i>已完成（千次）</span>'+
        '<span><i style="background:var(--color-danger)"></i>失败（×10 显示）</span>';
    })();

    // ════ 图表 2：任务状态分布（环形 donut） ════
    (function(){
      var slices=[
        {name:'已完成', val:8946, col:'--chart-1'},
        {name:'处理中', val:148,  col:'--chart-2'},
        {name:'排队',   val:96,   col:'--chart-3'},
        {name:'失败',   val:142,  col:'--color-danger'},
        {name:'超时',   val:28,   col:'--chart-6'}
      ];
      var total=slices.reduce(function(s,x){return s+x.val;},0);
      var cx=120,cy=110,r=78,rin=50, ang=-Math.PI/2;
      var svg=document.getElementById('donut'), g='';
      function pt(a,rad){return [cx+Math.cos(a)*rad, cy+Math.sin(a)*rad];}
      slices.forEach(function(s){
        var a0=ang, a1=ang+s.val/total*Math.PI*2; ang=a1;
        var large=(a1-a0)>Math.PI?1:0;
        var p0=pt(a0,r),p1=pt(a1,r),q0=pt(a1,rin),q1=pt(a0,rin);
        var col=cssvar(s.col);
        g+='<path d="M'+p0[0]+' '+p0[1]+' A'+r+' '+r+' 0 '+large+' 1 '+p1[0]+' '+p1[1]+
           ' L'+q0[0]+' '+q0[1]+' A'+rin+' '+rin+' 0 '+large+' 0 '+q1[0]+' '+q1[1]+' Z" fill="'+col+'"/>';
      });
      g+='<text class="donut-center" x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-size="22">9,360</text>';
      g+='<text class="donut-center-sub" x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" font-size="11">任务总数</text>';
      svg.innerHTML=g;
      document.getElementById('donut-legend').innerHTML=slices.map(function(s){
        return '<span><i style="background:var('+s.col+')"></i>'+s.name+' '+s.val+'</span>';
      }).join('');
    })();

    // ════ 图表 3：各任务类型平均耗时（横向柱状） ════
    (function(){
      var rows=[
        {name:'图像生成', val:9.4,  col:'--chart-6'},
        {name:'批量推理', val:7.8,  col:'--chart-4'},
        {name:'文档解析', val:5.2,  col:'--chart-3'},
        {name:'语音转写', val:4.1,  col:'--chart-5'},
        {name:'对话补全', val:2.6,  col:'--chart-1'},
        {name:'嵌入向量', val:0.9,  col:'--chart-2'}
      ];
      var W=1180,H=300,pad={l:96,r:60,t:10,b:24};
      var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
      var max=10;
      var svg=document.getElementById('bars'), g='';
      var grid=cssvar('--chart-grid');
      for(var t=0;t<=5;t++){
        var v=max*t/5, x=pad.l+v/max*iw;
        g+='<line x1="'+x+'" y1="'+pad.t+'" x2="'+x+'" y2="'+(pad.t+ih)+'" stroke="'+grid+'" stroke-width="1"/>';
        g+='<text class="ax-txt" x="'+x+'" y="'+(H-8)+'" text-anchor="middle">'+v+'s</text>';
      }
      var gh=ih/rows.length, bh=20;
      rows.forEach(function(r,i){
        var cy=pad.t+gh*i+gh/2;
        var w=r.val/max*iw, col=cssvar(r.col);
        g+='<text class="ax-txt" x="'+(pad.l-10)+'" y="'+(cy+4)+'" text-anchor="end" style="fill:var(--color-text-secondary)">'+r.name+'</text>';
        g+='<rect x="'+pad.l+'" y="'+(cy-bh/2)+'" width="'+w+'" height="'+bh+'" rx="4" fill="'+col+'"/>';
        g+='<text class="ax-txt" x="'+(pad.l+w+8)+'" y="'+(cy+4)+'" text-anchor="start" style="fill:var(--color-text)">'+r.val+'s</text>';
      });
      svg.innerHTML=g;
    })();

    // ════ 全量任务表格（16+ 行，6 态多样） ════
    var stMap={
      queue: {cls:'b-neutral', tone:'--color-text-muted', lab:'排队'},
      run:   {cls:'b-info',    tone:'--color-info',       lab:'处理中'},
      done:  {cls:'b-suc',     tone:'--color-success',    lab:'已完成'},
      fail:  {cls:'b-dan',     tone:'--color-danger',     lab:'失败'},
      time:  {cls:'b-warn',    tone:'--color-warning',    lab:'超时'},
      cancel:{cls:'b-neutral', tone:'--color-text-muted', lab:'已取消'}
    };
    var data=[
      {id:'tsk_9f3a1c', type:'对话补全', user:'u_alice',  ts:'06-20 05:28:11', st:'run',   pg:62,  dur:'2.1s'},
      {id:'tsk_9f3a18', type:'图像生成', user:'u_bob',    ts:'06-20 05:27:54', st:'run',   pg:38,  dur:'5.8s'},
      {id:'tsk_9f3a05', type:'嵌入向量', user:'u_carol',  ts:'06-20 05:27:40', st:'done',  pg:100, dur:'0.8s'},
      {id:'tsk_9f39f2', type:'批量推理', user:'svc_etl',  ts:'06-20 05:26:33', st:'run',   pg:74,  dur:'12.4s'},
      {id:'tsk_9f39e0', type:'文档解析', user:'u_dave',   ts:'06-20 05:25:18', st:'done',  pg:100, dur:'4.9s'},
      {id:'tsk_9f39c4', type:'语音转写', user:'u_erin',   ts:'06-20 05:24:02', st:'time',  pg:55,  dur:'31.2s'},
      {id:'tsk_9f39a1', type:'对话补全', user:'u_frank',  ts:'06-20 05:23:47', st:'done',  pg:100, dur:'2.3s'},
      {id:'tsk_9f3988', type:'图像生成', user:'u_grace',  ts:'06-20 05:22:30', st:'fail',  pg:18,  dur:'1.1s'},
      {id:'tsk_9f396f', type:'对话补全', user:'u_heidi',  ts:'06-20 05:21:55', st:'queue', pg:0,   dur:'—'},
      {id:'tsk_9f3951', type:'嵌入向量', user:'svc_index',ts:'06-20 05:20:12', st:'done',  pg:100, dur:'0.6s'},
      {id:'tsk_9f3940', type:'批量推理', user:'svc_etl',  ts:'06-20 05:19:08', st:'time',  pg:40,  dur:'34.7s'},
      {id:'tsk_9f3922', type:'文档解析', user:'u_ivan',   ts:'06-20 05:18:44', st:'done',  pg:100, dur:'5.5s'},
      {id:'tsk_9f3910', type:'对话补全', user:'u_judy',   ts:'06-20 05:17:21', st:'cancel',pg:30,  dur:'1.4s'},
      {id:'tsk_9f38f3', type:'语音转写', user:'u_karl',   ts:'06-20 05:16:09', st:'done',  pg:100, dur:'3.8s'},
      {id:'tsk_9f38e1', type:'图像生成', user:'u_lena',   ts:'06-20 05:15:50', st:'fail',  pg:22,  dur:'2.0s'},
      {id:'tsk_9f38c0', type:'对话补全', user:'u_mike',   ts:'06-20 05:14:33', st:'done',  pg:100, dur:'2.7s'},
      {id:'tsk_9f38a5', type:'嵌入向量', user:'svc_index',ts:'06-20 05:13:11', st:'queue', pg:0,   dur:'—'},
      {id:'tsk_9f3890', type:'批量推理', user:'svc_etl',  ts:'06-20 05:12:02', st:'done',  pg:100, dur:'9.8s'}
    ];
    function badge(st){
      var s=stMap[st];
      return '<span class="badge '+s.cls+'"><span class="dot" style="background:var('+s.tone+')"></span>'+s.lab+'</span>';
    }
    function progCell(r){
      if(r.st==='queue') return '<span class="muted cellmono">—</span>';
      return '<span class="prog"><span class="bar"><i style="width:'+r.pg+'%"></i></span><span class="pct">'+r.pg+'%</span></span>';
    }
    function acts(r){
      var a='<a class="doView">查看</a>';
      if(r.st==='run'||r.st==='queue') a+='<a class="dang">取消</a>';
      if(r.st==='fail'||r.st==='time') a+='<a>重试</a>';
      return '<div class="row-acts">'+a+'</div>';
    }
    var tbody=document.getElementById('tbody');
    tbody.innerHTML=data.map(function(r){
      return '<tr>'+
        '<td class="cellmono">'+r.id+'</td>'+
        '<td class="muted">'+r.type+'</td>'+
        '<td class="cellmono">'+r.user+'</td>'+
        '<td class="cellmono muted">'+r.ts+'</td>'+
        '<td>'+badge(r.st)+'</td>'+
        '<td>'+progCell(r)+'</td>'+
        '<td class="cellmono">'+r.dur+'</td>'+
        '<td>'+acts(r)+'</td>'+
      '</tr>';
    }).join('');
    document.getElementById('pgInfo').textContent='共 '+data.length+' 个任务（本页）· 全量 9,360';
  })();
  </script>
</body>
